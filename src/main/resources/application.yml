spring:
  application:
    name: "mite-sync"

logging:
  level:
    io:
    seventytwo:
      oss:
        logging:
          mite: "DEBUG"

# All values are typically set via environment variables
# (see .env.example and docker-compose.yml).
mite-sync:
  source:
    host: ""
    api-key: ""
    project-id: ""
    service-id: ""
    # Collector PBI for meeting notes (all calendar events are booked under this number)
    meeting-collector-pbi: ""
  target:
    host: ""
    api-key: ""
    project-id: ""
    service-id: ""

# Daily-Reports: Calendar + DevOps + booking logic
daily-reports:
  google-calendar:
    # Google Cloud project with the Calendar API enabled. Setup steps in HELP.md.
    # Path to the OAuth2 client_secret.json (downloaded from the Google Cloud Console)
    client-secret-file: "${user.home}/.mite-sync/google-client-secret.json"
    # Directory for persistent tokens (refresh token is stored here after the first login)
    tokens-directory: "${user.home}/.mite-sync/google-tokens"
    # Which calendar to read ("primary" for the account's main calendar, otherwise a specific
    # calendar id)
    calendar-id: "primary"
    # Recurring events that do NOT count as meetings (reminders, personal blockers).
    # Comma-separated because Spring's @Value does not reliably bind YAML lists to List<String>.
    skip-summaries: ""
  azure-devops:
    organization: ""
    project: ""
    pat: ""
  # Legacy rule keys — kept as the env-var override surface (DAILY_REPORTS_RULES_*,
  # see docker-compose.yml). The default profile below references them via placeholders.
  rules:
    # The daily is always booked at daily-fixed-minutes, regardless of calendar duration
    daily-event-summary: "Team Daily"
    daily-fixed-minutes: 15
    # Other meetings: rounded up to the next rounding-step-minutes
    rounding-step-minutes: 15

  # Project profiles: each profile selects a workflow type, the Mite instance to book into and
  # the booking rules. The profile key is the {project} path segment of the daily-report
  # endpoints; the legacy routes without a project use default-profile.
  default-profile: "default"
  profiles:
    default:
      # calendar-devops: Google Calendar + Azure DevOps + fill-up onto a main PBI.
      # git-activity: proposal derived from local git history (not implemented yet).
      workflow-type: "calendar-devops"
      # Which configured Mite instance to read from and book into ("source" or "target")
      mite-instance: "source"
      project-id: "${mite-sync.source.project-id}"
      service-id: "${mite-sync.source.service-id}"
      meeting-collector-pbi: "${mite-sync.source.meeting-collector-pbi}"
      rules:
        daily-event-summary: "${daily-reports.rules.daily-event-summary}"
        daily-fixed-minutes: "${daily-reports.rules.daily-fixed-minutes}"
        rounding-step-minutes: "${daily-reports.rules.rounding-step-minutes}"
        # Daily booking target when the request body does not override it (375 min = 6.25 h)
        target-minutes: 375
    # Example of a git-activity profile (endpoint wiring lands with issue #3):
    # the proposal is derived purely from local git history — commit days/timestamps estimate
    # the duration, commit-message prefixes identify the tickets.
    #
    # my-project:
    #   workflow-type: "git-activity"
    #   mite-instance: "target"
    #   project-id: ""
    #   service-id: ""
    #   rules:
    #     target-minutes: 240
    #   git:
    #     repositories:
    #       - "/path/to/local/repo"
    #     author: "name-or-email-fragment"   # blank = all committers
    #     ticket-pattern: "^([A-Z]+-\\d+)"   # first group = ticket id
    #     session-gap-minutes: 90            # larger gaps split the day into sessions
    #     lead-in-minutes: 30                # added per session for work before the first commit
    #     fallback-ticket: ""                # bucket for commits without a ticket id
